<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Achille Cipriani</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="favicon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1b1a17;
    --muted: #8c887e;
    --line: #d9d4c7;
    --error: #9a4b3f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 7vh 24px;
    text-align: center;
  }
  .logo {
    width: 78px;
    height: 78px;
    margin-bottom: 2.1rem;
    opacity: 0;
    animation: rise 1s 0.02s ease forwards;
  }
  .logo svg { display: block; width: 100%; height: 100%; }
  .logo .st { fill: none; stroke: var(--ink); }
  .overline {
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.2rem;
    padding-left: 0.42em;
    opacity: 0;
    animation: rise 0.9s 0.16s ease forwards;
  }
  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 4.6vw, 3.7rem);
    line-height: 1.08;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: rise 1s 0.18s ease forwards;
  }
  .rule {
    width: 38px;
    height: 1px;
    background: var(--ink);
    margin: 2.6rem 0 2.4rem;
    opacity: 0;
    animation: rise 1s 0.36s ease forwards;
  }
  .access {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    opacity: 0;
    animation: rise 1s 0.5s ease forwards;
  }
  .access-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    text-align: left;
  }
  .field span {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field input {
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    font-family: "Cormorant Garamond", serif;
    font-size: 1.35rem;
    color: var(--ink);
    padding: 0.35rem 0;
    transition: border-color 0.3s ease;
  }
  .field input:focus { outline: none; border-color: var(--ink); }
  .field input::placeholder { color: #c4bfb2; }
  .submit {
    margin-top: 0.6rem;
    align-self: flex-start;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 0.4rem 0;
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    transition: gap 0.3s ease, opacity 0.3s ease;
  }
  .submit:hover { gap: 1.1rem; }
  .submit[disabled] { opacity: 0.45; cursor: default; }
  .msg {
    min-height: 1.1rem;
    font-size: 12.5px;
    color: var(--error);
    letter-spacing: 0.02em;
    text-align: left;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .msg.show { opacity: 1; }
  .msg.ok { color: var(--muted); }
  .shake { animation: shake 0.4s ease; }
  footer {
    text-align: center;
    padding: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    font-size: 10.5px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #b3aea2;
  }
  footer a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: none;
    transition: color 0.3s ease;
  }
  footer a:hover { color: var(--ink); }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .logo, .overline, .name, .rule, .access { transform: translateY(14px); }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="logo" aria-label="Achille Cipriani">
      <svg viewBox="0 0 150 150" role="img">
        <circle class="st" stroke-width="2.5" cx="75" cy="75" r="62"></circle>
        <path class="st" stroke-width="2.5" stroke-linecap="round" d="M101 39 A44 44 0 1 0 101 111"></path>
        <path class="st" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M60 92 L75 56 L90 92"></path>
      </svg>
    </div>
    <div class="overline">Consulenza</div>
    <h1 class="name">Achille Cipriani</h1>
    <div class="rule"></div>
    <form class="access" id="accessForm" autocomplete="off">
      <div class="access-label">Area riservata clienti</div>
      <label class="field">
        <span>Azienda</span>
        <input id="company" type="text" placeholder="Nome azienda" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input id="password" type="password" placeholder="••••••••" required />
      </label>
      <p class="msg" id="msg" aria-live="polite"></p>
      <button class="submit" type="submit" id="submitBtn">
        Accedi <span class="arrow">→</span>
      </button>
    </form>
  </main>
  <footer>
    <span>Achille Cipriani — Consulenza</span>
    <a href="mailto:achillecipriani@gmail.com">achillecipriani@gmail.com</a>
  </footer>
<script>
  /*
    ACCESSO CIFRATO (AES-GCM)
    ─────────────────────────
    Il link di destinazione è cifrato: né la password né l'URL compaiono
    in chiaro nel codice. La chiave si deriva da  "azienda:password"
    (PBKDF2, 250.000 iterazioni). Senza credenziali corrette il link non è
    ricavabile. Per aggiungere/aggiornare un'azienda, rigenerare il blocco
    cifrato e inserirlo nell'array ENTRIES qui sotto.
  */
  (function () {
    var ENTRIES = [
      {
        salt: "2n3hDdmxi/oDBP2Eyybd8w==",
        iv: "FpRaCFGN3K29QKKb",
        ct: "r/5MDBou9XcPePQFtk5ILrcGzVp6rjDqrYUNiQpKHoP8TfUPXY7cdpTGSddWsEdgJeISWQ==",
        iterations: 250000
      }
    ];

    var form = document.getElementById("accessForm");
    var company = document.getElementById("company");
    var password = document.getElementById("password");
    var msg = document.getElementById("msg");
    var btn = document.getElementById("submitBtn");

    function b64d(s) { return Uint8Array.from(atob(s), function (c) { return c.charCodeAt(0); }); }

    async function unlock(companyVal, passwordVal) {
      var enc = new TextEncoder();
      var phrase = enc.encode(companyVal.trim().toLowerCase() + ":" + passwordVal);
      for (var i = 0; i < ENTRIES.length; i++) {
        var e = ENTRIES[i];
        try {
          var km = await crypto.subtle.importKey("raw", phrase, "PBKDF2", false, ["deriveKey"]);
          var key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: b64d(e.salt), iterations: e.iterations, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
          );
          var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(e.iv) }, key, b64d(e.ct));
          var url = new TextDecoder().decode(pt);
          if (/^https?:\/\//.test(url)) return url;
        } catch (_) { /* chiave errata: prova la prossima */ }
      }
      return null;
    }

    function fail() {
      msg.textContent = "Azienda o password non corretti. Riprova.";
      msg.classList.add("show"); msg.classList.remove("ok");
      form.classList.remove("shake"); void form.offsetWidth; form.classList.add("shake");
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      btn.disabled = true;
      msg.textContent = "Verifica…"; msg.classList.add("show", "ok");
      var url = await unlock(company.value, password.value);
      if (url) {
        msg.textContent = "Accesso consentito — reindirizzamento…";
        setTimeout(function () { window.location.href = url; }, 700);
      } else {
        btn.disabled = false;
        fail();
      }
    });

    [company, password].forEach(function (el) {
      el.addEventListener("input", function () { msg.classList.remove("show"); });
    });
  })();
</script>
</body>
</html>
