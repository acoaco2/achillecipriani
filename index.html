<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Achille Cipriani</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="favicon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #faf8f3;
    --ink: #1b1a17;
    --teal: #1f5d63;
    --teal-deep: #123f44;
    --mint: #8fd4c8;
    --cream-soft: #cfdedb;
    --muted: #706b5e;
    --line: #d9d4c7;
    --field-line: #8f8a7c;
    --placeholder: #959082;
    --accent: #1f5d63;
    --accent-deep: #16555b;
    --error: #9a4b3f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .split {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
  }

  /* ---- Pannello sinistro: verde petrolio drenched ---- */
  .panel {
    background: radial-gradient(125% 95% at 12% 0%, #235e64 0%, var(--teal-deep) 100%);
    color: var(--cream);
    display: grid;
    grid-template-rows: 1fr auto;
    padding: clamp(2.5rem, 5vw, 5.5rem);
  }
  .panel-main { align-self: center; }
  .logo {
    width: 76px; height: 76px; margin-bottom: 2rem;
    animation: rise 1s 0.02s ease both;
  }
  .logo svg { display: block; width: 100%; height: 100%; }
  .logo .st { fill: none; stroke: var(--cream); }
  .overline {
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--cream-soft); margin-bottom: 1.4rem; padding-left: 0.42em;
    animation: rise 0.9s 0.14s ease both;
  }
  .name {
    font-family: "Cormorant Garamond", serif; font-weight: 300;
    font-size: clamp(2.8rem, 4.8vw, 4.4rem); line-height: 1.04;
    letter-spacing: 0.01em; color: var(--cream); text-wrap: balance;
    animation: rise 1s 0.2s ease both;
  }
  .rule {
    width: 54px; height: 3px; background: var(--mint); border-radius: 2px;
    margin: 2rem 0 0; animation: rise 1s 0.34s ease both;
  }
  .tag {
    margin-top: 2.3rem; max-width: 32ch;
    font-family: "Cormorant Garamond", serif; font-size: 1.2rem; line-height: 1.5;
    color: var(--cream-soft); animation: rise 1s 0.46s ease both;
  }
  .panel-contact {
    align-self: end; padding-top: 2rem;
    display: flex; flex-direction: column; gap: 0.45rem;
    animation: rise 1s 0.6s ease both;
  }
  .contact-label {
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--mint);
  }
  .panel-contact a {
    color: var(--cream); text-decoration: none; font-size: 13px; letter-spacing: 0.04em;
    border-bottom: 1px solid rgba(143, 212, 200, 0.5); padding-bottom: 2px; width: fit-content;
    transition: border-color 0.3s ease;
  }
  .panel-contact a:hover { border-color: var(--mint); }

  /* ---- Lato destro: form su crema ---- */
  .formside {
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    padding: clamp(2rem, 5vw, 4rem);
  }
  .access {
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 1.3rem;
    animation: rise 1s 0.3s ease both;
  }
  .access-label {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); font-weight: 600;
  }
  .field { display: flex; flex-direction: column; gap: 0.5rem; text-align: left; }
  .field span {
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
  }
  .field input {
    border: none; border-bottom: 1px solid var(--field-line); background: transparent;
    font-family: "Cormorant Garamond", serif; font-size: 1.35rem; color: var(--ink);
    padding: 0.35rem 0; transition: border-color 0.3s ease;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--placeholder); }
  .pw-wrap { position: relative; display: flex; align-items: stretch; }
  .pw-wrap input { flex: 1; padding-right: 2.2rem; width: 100%; }
  .pw-toggle {
    position: absolute; right: 0; bottom: 0.35rem;
    background: none; border: none; cursor: pointer; padding: 0.2rem;
    color: var(--muted); display: inline-flex; align-items: center; transition: color 0.3s ease;
  }
  .pw-toggle:hover { color: var(--accent); }
  .pw-toggle:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }
  .pw-toggle svg { display: block; }
  .pw-toggle::before { content: ""; position: absolute; inset: -12px -8px -12px -16px; }
  .submit {
    margin-top: 0.4rem; align-self: stretch; cursor: pointer;
    background: var(--accent); color: var(--cream); border: none; border-radius: 8px;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    padding: 1rem 1.6rem; min-height: 44px;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.7rem;
    transition: background 0.25s ease, gap 0.25s ease, opacity 0.25s ease;
  }
  .submit:hover { background: var(--accent-deep); gap: 1.05rem; }
  .submit[disabled] { opacity: 0.5; cursor: default; }
  .msg {
    min-height: 1.1rem; font-size: 12.5px; color: var(--error);
    letter-spacing: 0.02em; text-align: left; opacity: 0; transition: opacity 0.25s ease;
  }
  .msg.show { opacity: 1; }
  .msg.ok { color: var(--muted); }
  .shake { animation: shake 0.4s ease; }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }

  @media (max-width: 760px) {
    .split { grid-template-columns: 1fr; }
    .panel { grid-template-rows: auto; padding: clamp(2.4rem, 8vw, 3.5rem) 28px; }
    .panel-contact, .tag { display: none; }
    .formside { padding: 2.6rem 28px 3.5rem; }
    .name { font-size: clamp(2.6rem, 9vw, 3.4rem); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo, .overline, .name, .rule, .tag, .panel-contact, .access {
      animation: none; opacity: 1; transform: none;
    }
  }
</style>
</head>
<body>
  <main class="split">
    <section class="panel">
      <div class="panel-main">
        <div class="logo">
          <svg viewBox="0 0 150 150" aria-hidden="true">
            <circle class="st" stroke-width="2.5" cx="75" cy="75" r="62"></circle>
            <path class="st" stroke-width="2.5" stroke-linecap="round" d="M101 39 A44 44 0 1 0 101 111"></path>
            <path class="st" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M60 92 L75 56 L90 92"></path>
          </svg>
        </div>
        <div class="overline">Consulenza</div>
        <h1 class="name">Achille Cipriani</h1>
        <div class="rule"></div>
        <p class="tag">Consulenza su misura per le aziende. Accesso riservato ai clienti.</p>
      </div>
      <div class="panel-contact">
        <span class="contact-label">Contatti</span>
        <a href="mailto:achillecipriani@gmail.com">achillecipriani@gmail.com</a>
      </div>
    </section>

    <section class="formside">
      <form class="access" id="accessForm" autocomplete="off">
        <div class="access-label">Area riservata clienti</div>
        <label class="field">
          <span>Azienda</span>
          <input id="company" type="text" placeholder="Nome azienda" required />
        </label>
        <label class="field">
          <span>Password</span>
          <div class="pw-wrap">
            <input id="password" type="password" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostra password" aria-pressed="false"></button>
          </div>
        </label>
        <p class="msg" id="msg" aria-live="polite"></p>
        <button class="submit" type="submit" id="submitBtn">
          Accedi <span aria-hidden="true">→</span>
        </button>
      </form>
    </section>
  </main>

<script>
  /*
    ACCESSO CIFRATO (AES-GCM)
    ─────────────────────────
    Il link di destinazione è cifrato: né la password né l'URL compaiono
    in chiaro nel codice. La chiave si deriva da  "azienda:password"
    (PBKDF2, 250.000 iterazioni). Senza credenziali corrette il link non è
    ricavabile. Per aggiungere/aggiornare un'azienda, rigenerare il blocco
    cifrato e inserirlo nell'array ENTRIES qui sotto.
  */
  (function () {
    var ENTRIES = [
      {
        salt: "Rq7XxFGGXAbD9ZbNiXmHcg==",
        iv: "+0O40+r7VvrVmFxE",
        ct: "TYFw7UTU9/fIcmVYsTX6nSEEm26Gq4MW/89Z45ksjRA3Oz1UjHSBo97/cDFsjhBfBiaX+BhcbYp1EkgUASqHYIpTaibSo1j3+6IocTiu71bQEmabI12MWaryI0Nkxfw6Ek1cBXcsUg==",
        iterations: 250000
      }
    ];

    var form = document.getElementById("accessForm");
    var company = document.getElementById("company");
    var password = document.getElementById("password");
    var msg = document.getElementById("msg");
    var btn = document.getElementById("submitBtn");
    var pwToggle = document.getElementById("pwToggle");

    var EYE = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYE_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    pwToggle.innerHTML = EYE;
    pwToggle.addEventListener("click", function () {
      var show = password.type === "password";
      password.type = show ? "text" : "password";
      pwToggle.innerHTML = show ? EYE_OFF : EYE;
      pwToggle.setAttribute("aria-pressed", show ? "true" : "false");
      pwToggle.setAttribute("aria-label", show ? "Nascondi password" : "Mostra password");
      password.focus();
    });

    function b64d(s) { return Uint8Array.from(atob(s), function (c) { return c.charCodeAt(0); }); }

    async function unlock(companyVal, passwordVal) {
      var enc = new TextEncoder();
      var co = companyVal.trim().toLowerCase();
      // Scorciatoia DJ: credenziali dj / dj -> sezione DJ (pubblica, percorso relativo)
      if (co === "dj" && passwordVal === "dj") return "dj/";
      var phrase = enc.encode(co + ":" + passwordVal);
      for (var i = 0; i < ENTRIES.length; i++) {
        var e = ENTRIES[i];
        try {
          var km = await crypto.subtle.importKey("raw", phrase, "PBKDF2", false, ["deriveKey"]);
          var key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: b64d(e.salt), iterations: e.iterations, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
          );
          var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(e.iv) }, key, b64d(e.ct));
          var url = new TextDecoder().decode(pt);
          if (/^https?:\/\//.test(url)) return url;
        } catch (_) { /* chiave errata: prova la prossima */ }
      }
      return null;
    }

    function fail() {
      msg.textContent = "Azienda o password non corretti. Riprova.";
      msg.classList.add("show"); msg.classList.remove("ok");
      form.classList.remove("shake"); void form.offsetWidth; form.classList.add("shake");
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Senza Web Crypto (es. pagina aperta da file:// o browser molto vecchio)
      // l'accesso non è possibile: messaggio chiaro invece di un fallimento muto.
      if (!window.crypto || !window.crypto.subtle) {
        msg.textContent = "Accesso non disponibile qui. Apri il sito da https://achillecipriani.it";
        msg.classList.add("show"); msg.classList.remove("ok");
        return;
      }

      btn.disabled = true;
      msg.textContent = "Verifica…"; msg.classList.add("show", "ok");

      var url = null;
      try {
        url = await unlock(company.value, password.value);
      } catch (err) {
        url = null;
      }

      if (url) {
        msg.textContent = "Accesso consentito, reindirizzamento…";
        setTimeout(function () { window.location.href = url; }, 700);
      } else {
        btn.disabled = false;
        fail();
      }
    });

    [company, password].forEach(function (el) {
      el.addEventListener("input", function () { msg.classList.remove("show"); });
    });
  })();
</script>
</body>
</html>
