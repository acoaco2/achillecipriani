<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logofarma</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/favicon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1b1a17;
    --muted: #8c887e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 7vh 24px;
    text-align: center;
  }
  .overline {
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.6rem;
    padding-left: 0.42em;
    opacity: 0;
    animation: rise 0.9s 0.1s ease forwards;
  }
  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 4.6rem);
    line-height: 1.05;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: rise 1s 0.2s ease forwards;
  }
  .overline, .name { transform: translateY(14px); }
  @keyframes rise { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .overline, .name { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <main>
    <div class="overline">Area Logofarma</div>
    <h1 class="name">Logofarma</h1>
  </main>
</body>
</html>
