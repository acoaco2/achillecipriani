<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logofarma</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/favicon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1b1a17;
    --muted: #8c887e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 7vh 24px;
    text-align: center;
  }
  .overline {
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.6rem;
    padding-left: 0.42em;
    animation: rise 0.9s 0.1s ease both;
  }
  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 4.6rem);
    line-height: 1.05;
    letter-spacing: 0.01em;
    animation: rise 1s 0.2s ease both;
  }
  .noaccess { animation: rise 0.9s 0.05s ease both; }
  .gate-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.1rem;
  }
  .hint {
    font-family: "Cormorant Garamond", serif;
    font-size: 1.4rem;
    color: var(--ink);
  }
  .hint a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--muted);
    padding-bottom: 1px;
    transition: border-color 0.3s ease;
  }
  .hint a:hover { border-color: var(--ink); }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .overline, .name, .noaccess { animation: none; }
  }
</style>
</head>
<body>
  <main>
    <!-- Mostrato quando non si ha la chiave (accesso diretto, senza passare dalla home) -->
    <div class="noaccess" id="noaccess" hidden>
      <div class="gate-label">Area riservata</div>
      <p class="hint">Accedi dalla <a href="/">pagina iniziale</a>.</p>
    </div>

    <!-- Contenuto decifrato -->
    <div id="content" hidden></div>
  </main>

<script>
  /*
    CONTENUTO CIFRATO (AES-GCM)
    ───────────────────────────
    Il contenuto non compare in chiaro nel sorgente. La chiave (token) NON è
    qui: arriva solo dal login sulla pagina iniziale, che reindirizza con
    #k=<token> nel frammento. Il token viene salvato in sessionStorage e il
    frammento ripulito dall'URL. Chi apre /Logofarma direttamente non ha il
    token e non vede alcun contenuto.
    Per aggiornare il contenuto: rigenerare DATA con lo stesso token e
    rigenerare la voce cifrata della home.
  */
  (function () {
    var DATA = {
      salt: "KX7yF933da1mtbYh8AH4Gw==",
      iv: "6yG2N1zx+6qaCZyo",
      ct: "/b0YYIrUIidFlMqiduRpl918xL85Et688o+dyjFZE+mXAnR/63AgjsToNEKFKbpkOmtsJ6zTZRT71DbTldsZQTxK6zhRC4yyZl+5OQZdKKZ49HnLfkRZedBiG1rLPA==",
      iterations: 250000
    };
    var SS_KEY = "lf_token";

    var noaccess = document.getElementById("noaccess");
    var content = document.getElementById("content");

    function showNoAccess() { noaccess.hidden = false; }

    function b64d(s) { return Uint8Array.from(atob(s), function (c) { return c.charCodeAt(0); }); }

    function readToken() {
      // 1) dal frammento dell'URL (#k=...) lasciato dal redirect della home
      var h = location.hash || "";
      var m = h.match(/[#&]k=([^&]+)/);
      if (m) {
        var tok = decodeURIComponent(m[1]);
        try { sessionStorage.setItem(SS_KEY, tok); } catch (e) {}
        // ripulisce il frammento dall'URL (senza ricaricare)
        try { history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
        return tok;
      }
      // 2) già sbloccato in questa sessione (es. refresh)
      try { return sessionStorage.getItem(SS_KEY); } catch (e) { return null; }
    }

    async function decrypt(token) {
      var enc = new TextEncoder();
      var km = await crypto.subtle.importKey("raw", enc.encode(token), "PBKDF2", false, ["deriveKey"]);
      var key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64d(DATA.salt), iterations: DATA.iterations, hash: "SHA-256" },
        km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
      );
      var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(DATA.iv) }, key, b64d(DATA.ct));
      return new TextDecoder().decode(pt);
    }

    (async function () {
      var token = readToken();
      if (!token || !window.crypto || !window.crypto.subtle) { showNoAccess(); return; }
      try {
        var html = await decrypt(token);
        content.innerHTML = html;
        content.hidden = false;
      } catch (_) {
        try { sessionStorage.removeItem(SS_KEY); } catch (e) {}
        showNoAccess();
      }
    })();
  })();
</script>
</body>
</html>
